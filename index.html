<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mawid - Version Fonctionnelle</title>
  <style>
    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --bg: #f5f5f3;
      --white: #ffffff;
      --border: #dddddd;
      --text: #1a1a1a;
      --muted: #777;
      --danger: #e24b4a;
      --warning: #ef9f27;
    }* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

#app {
  max-width: 900px;
  margin: auto;
  min-height: 100vh;
  background: var(--white);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: white;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  color: var(--green);
}

.page {
  padding: 20px;
}

.btn {
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
}

.btn-green {
  background: var(--green);
  color: white;
}

.btn-gray {
  background: #f1f1f1;
}

.card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
}

.input {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
}

.login-page {
  padding: 40px 20px;
  max-width: 500px;
  margin: auto;
}

.center {
  text-align: center;
}

.muted {
  color: var(--muted);
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stat {
  background: #fafafa;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}

.stat-number {
  font-size: 28px;
  font-weight: 800;
  color: var(--green);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  font-size: 14px;
}

.badge {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  display: inline-block;
}

.success { background: #eaf8f2; color: var(--green-dark); }
.warning { background: #fff4df; color: #9a6400; }
.danger { background: #fdecec; color: #a32d2d; }

  </style>
</head>
<body>
<div id="app"></div><script>
const DB = {
  admin: {
    password: "mawid2025"
  },
  clients: [
    {
      id: "C001",
      name: "Clinique Al Nasr",
      contact: "Dr Ahmed",
      sector: "Médical",
      phone: "+222 36 12 34 56",
      subscription: "trial",
      daysLeft: 7,
      appointments: 18
    },
    {
      id: "C002",
      name: "BNM Agence Ksar",
      contact: "M. Cheikh",
      sector: "Bancaire",
      phone: "+222 22 98 76 54",
      subscription: "expired",
      daysLeft: 0,
      appointments: 11
    },
    {
      id: "C003",
      name: "Cabinet Juridique Salem",
      contact: "Me Brahim",
      sector: "Juridique",
      phone: "+222 44 55 66 77",
      subscription: "active",
      daysLeft: 28,
      appointments: 24
    }
  ]
};

const STATE = {
  view: "login",
  user: null
};

function render() {
  const app = document.getElementById("app");

  if (STATE.view === "login") {
    app.innerHTML = loginPage();
    return;
  }

  if (STATE.view === "admin") {
    app.innerHTML = adminPage();
    return;
  }
}

function loginPage() {
  return `
    <div class="login-page">
      <div class="center">
        <div class="logo">Mawid</div>
        <p class="muted">موعد<br>Panneau Administrateur</p>
      </div>

      <div class="card" style="margin-top:24px;">
        <input
          id="password"
          type="password"
          class="input"
          placeholder="Mot de passe administrateur"
          onkeydown="if(event.key==='Enter') loginAdmin()"
        />

        <button class="btn btn-green" style="width:100%;" onclick="loginAdmin()">
          Se connecter
        </button>

        <p id="error" class="center" style="color:red; display:none; margin-top:10px;">
          Mot de passe incorrect
        </p>
      </div>
    </div>
  `;
}

function adminPage() {
  const active = DB.clients.filter(c => c.subscription === "active").length;
  const trial = DB.clients.filter(c => c.subscription === "trial").length;
  const blocked = DB.clients.filter(c => c.subscription === "expired").length;
  const revenue = active * 3000;

  return `
    <div class="topbar">
      <div class="logo">Mawid</div>
      <button class="btn btn-gray" onclick="logout()">Déconnexion</button>
    </div>

    <div class="page">
      <div class="stats">
        <div class="stat">
          <div class="stat-number">${DB.clients.length}</div>
          <div>Total Clients</div>
        </div>

        <div class="stat">
          <div class="stat-number">${active}</div>
          <div>Abonnés actifs</div>
        </div>

        <div class="stat">
          <div class="stat-number">${trial}</div>
          <div>En essai</div>
        </div>

        <div class="stat">
          <div class="stat-number">${blocked}</div>
          <div>Bloqués</div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:12px;">Revenu estimé : ${revenue.toLocaleString("fr-FR")} MRU / mois</h3>

        <table>
          <thead>
            <tr>
              <th>Client</th>
              <th>Secteur</th>
              <th>Téléphone</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${DB.clients.map(client => `
              <tr>
                <td>
                  <strong>${client.name}</strong><br>
                  <small>${client.contact}</small>
                </td>
                <td>${client.sector}</td>
                <td>${client.phone}</td>
                <td>${statusBadge(client)}</td>
                <td>
                  <button class="btn btn-green" onclick="activateClient('${client.id}')">
                    Activer
                  </button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function statusBadge(client) {
  if (client.subscription === "active") {
    return `<span class="badge success">Actif (${client.daysLeft}j)</span>`;
  }

  if (client.subscription === "trial") {
    return `<span class="badge warning">Essai (${client.daysLeft}j)</span>`;
  }

  return `<span class="badge danger">Bloqué</span>`;
}

function loginAdmin() {
  const input = document.getElementById("password");
  const error = document.getElementById("error");

  if (!input) return;

  if (input.value.trim() === DB.admin.password) {
    STATE.view = "admin";
    STATE.user = { type: "admin" };
    render();
  } else {
    error.style.display = "block";
    input.value = "";
    input.focus();
  }
}

function activateClient(id) {
  const client = DB.clients.find(c => c.id === id);
  if (!client) return;

  client.subscription = "active";
  client.daysLeft = 30;
  render();
}

function logout() {
  STATE.view = "login";
  STATE.user = null;
  render();
}

render();
</script></body>
</html>
