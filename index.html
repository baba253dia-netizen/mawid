<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mawid موعد</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root { 
  --vert: #1D9E75; --vert-f: #0F6E56; --vert-cl: #E1F5EE; --vert-tx: #085041;
  --orange: #EF9F27; --orange-cl: #FAEEDA; --orange-tx: #854F0B;
  --rouge: #E24B4A; --rouge-cl: #FCEBEB; --rouge-tx: #A32D2D;
  --bleu-cl: #E6F1FB; --bleu-tx: #185FA5;
  --fond: #ffffff; --fond2: #F5F5F3; --bord: #E0E0DC;
  --texte: #1A1A1A; --texte2: #777;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--fond2); color: var(--texte); }
#app { max-width: 820px; margin: 0 auto; background: var(--fond); min-height: 100vh; }

/* BARRE SUPÉRIEURE */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--bord); background: var(--fond); position: sticky; top: 0; z-index: 10; }
.logo { font-size: 22px; font-weight: 800; color: var(--vert); letter-spacing: -1px; }
.logo span { font-size: 13px; color: var(--texte2); font-weight: 400; margin-left: 6px; }

/* BOUTONS */
.btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; transition: opacity 0.15s; }
.btn:hover { opacity: .85; }
.btn-vert { background: var(--vert); color: #fff; }
.btn-gris { background: var(--fond2); border: 1px solid var(--bord); color: var(--texte2); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

/* CONTENEUR */
.page { padding: 20px; }

/* STATISTIQUES */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat { background: var(--fond2); border-radius: 10px; padding: 12px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 800; color: var(--vert); }
.stat-lbl { font-size: 11px; color: var(--texte2); margin-top: 2px; }

/* LISTE CLIENTS & BADGES */
.section-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 15px; }
.section-titre { font-size: 15px; font-weight: 700; }
.tableau { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
.tableau th { text-align: left; padding: 9px 12px; font-size: 11px; color: var(--texte2); border-bottom: 1px solid var(--bord); background: var(--fond2); font-weight: 700; }
.tableau td { padding: 12px; border-bottom: 1px solid var(--bord); vertical-align: middle; }
.tableau tr:hover td { background: var(--fond2); }

.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; display: inline-block; }
.badge-confirme { background: var(--vert-cl); color: var(--vert-tx); }
.badge-attente { background: var(--orange-cl); color: var(--orange-tx); }
.badge-fait { background: var(--fond2); color: var(--texte2); border: 1px solid var(--bord); }
.badge-annule { background: var(--rouge-cl); color: var(--rouge-tx); }
.badge-admin { background: var(--bleu-cl); color: var(--bleu-tx); }

/* ONGLETS */
.onglets { display: flex; border-bottom: 1px solid var(--bord); margin-bottom: 14px; overflow-x: auto; }
.onglet { padding: 10px 14px; font-size: 13px; border: none; background: transparent; cursor: pointer; color: var(--texte2); border-bottom: 2px solid transparent; white-space: nowrap; font-family: inherit; font-weight: 500; }
.onglet.actif { color: var(--vert); border-bottom-color: var(--vert); font-weight: 700; }

/* SE CONNECTER SCREEN */
.login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 40px 20px; }
.login-logo { font-size: 56px; font-weight: 900; color: var(--vert); letter-spacing: -2px; }
.login-ar { font-size: 28px; color: var(--texte2); direction: rtl; margin-top: 4px; }
.login-sub { font-size: 14px; color: var(--texte2); margin: 10px 0 30px; text-align: center; line-height: 1.6; }
.admin-zone { width: 100%; max-width: 460px; background: var(--fond2); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--bord); }
.champ { width: 100%; padding: 12px; border: 1px solid var(--bord); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--fond); color: var(--texte); margin-bottom: 12px; }
.champ:focus { outline: 2px solid var(--vert); border-color: transparent; }
.erreur { font-size: 12px; color: var(--rouge); text-align: center; margin-bottom: 10px; display: none; }

#dashboard { display: none; }
@media (max-width: 560px) { .stats { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div id="app">
  <div id="login-screen" class="login-page">
    <div class="login-logo">Mawid</div>
    <div class="login-ar">موعد</div>
    <div class="login-sub">Système de gestion de rendez-vous multi-secteurs</div>
    
    <div class="admin-zone">
      <input type="password" id="pin-input" class="champ" placeholder="Code PIN Administrateur">
      <button id="login-btn" class="btn btn-vert" style="width: 100%; justify-content: center;">Ouvrir l'application</button>
      <div id="login-error" class="erreur">Code PIN incorrect</div>
    </div>
  </div>

  <div id="dashboard">
    <div class="topbar">
      <div class="logo">Mawid<span>Espace Admin</span></div>
      <button class="btn btn-gris btn-sm" id="logout-btn"><i class="ti-logout"></i> Quitter</button>
    </div>
    
    <div class="page">
      <div class="onglets">
        <button class="onglet actif" data-tab="clients">Vue d'ensemble</button>
        <button class="onglet" data-tab="config">Configuration</button>
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Partenaires</div></div>
        <div class="stat"><div class="stat-num" id="stat-medical">0</div><div class="stat-lbl">Secteur Médical</div></div>
        <div class="stat"><div class="stat-num" id="stat-rdv">0</div><div class="stat-lbl">RDV Globaux</div></div>
        <div class="stat"><div class="stat-num" id="stat-actifs">0</div><div class="stat-lbl">Abonnés Actifs</div></div>
      </div>

      <div class="section-hd">
        <div class="section-titre">Établissements partenaires (Mauritanie)</div>
      </div>

      <table class="tableau">
        <thead>
          <tr>
            <th>Établissement</th>
            <th>Secteur</th>
            <th>Contact</th>
            <th>Statut</th>
            <th>RDV Today</th>
          </tr>
        </thead>
        <tbody id="clients-table-body">
          </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── BASE DE DONNÉES DÉMO RESTAURÉE ET COMPLÈTE ───────────────────
const BDD = {
  clients: [
    {
      id: 'C001',
      nom: 'Clinique Al Nasr',
      contact: 'Dr Ahmed Ould Mohamed',
      telephone: '+222 36 12 34 56',
      secteur: 'Médical',
      statut: 'Actif',
      rdv_count: 5
    },
    {
      id: 'C002',
      nom: 'BNM — Agence Ksar',
      contact: 'M. Cheikh Ould Salem',
      telephone: '+222 22 98 76 54',
      secteur: 'Bancaire',
      statut: 'Expiré',
      rdv_count: 3
    },
    {
      id: 'C003',
      nom: 'Cabinet Juridique Ould Salem',
      contact: 'Me Brahim Ould Salem',
      telephone: '+222 44 55 66 77',
      secteur: 'Juridique',
      statut: 'Actif',
      rdv_count: 4
    },
    {
      id: 'C004',
      nom: 'Préfecture de Nouakchott',
      contact: 'M. Sidi Ould Mohamed',
      telephone: '+222 45 12 34 56',
      secteur: 'Administratif',
      statut: 'Essai',
      rdv_count: 2
    }
  ]
};

// ── LOGIQUE DE L'APPLICATION ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const pinInput = document.getElementById('pin-input');
  const loginBtn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('login-error');
  const loginScreen = document.getElementById('login-screen');
  const dashboard = document.getElementById('dashboard');
  const logoutBtn = document.getElementById('logout-btn');
  
  const motDePasseCorrect = "mawid2025";

  // Fonction pour charger l'interface utilisateur dynamique
  function initialiserDashboard() {
    // 1. Calcul et mise à jour des statistiques
    document.getElementById('stat-total').innerText = BDD.clients.length;
    document.getElementById('stat-medical').innerText = BDD.clients.filter(c => c.secteur === 'Médical').length;
    document.getElementById('stat-rdv').innerText = BDD.clients.reduce((sum, c) => sum + c.rdv_count, 0);
    document.getElementById('stat-actifs').innerText = BDD.clients.filter(c => c.statut === 'Actif').length;

    // 2. Remplissage du tableau des partenaires
    const tbody = document.getElementById('clients-table-body');
    tbody.innerHTML = ''; // Nettoyage

    BDD.clients.forEach(client => {
      let badgeClass = 'badge-attente';
      if (client.statut === 'Actif') badgeClass = 'badge-confirme';
      if (client.statut === 'Expiré') badgeClass = 'badge-annule';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${client.nom}</strong><br><small style="color:#777">${client.telephone}</small></td>
        <td><span class="badge badge-admin">${client.secteur}</span></td>
        <td>${client.contact}</td>
        <td><span class="badge ${badgeClass}">${client.statut}</span></td>
        <td><strong style="color:var(--vert)">${client.rdv_count} rdv</strong></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function verifierPIN() {
    if (pinInput.value === motDePasseCorrect) {
      errorMsg.style.display = 'none';
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      initialiserDashboard();
    } else {
      errorMsg.style.display = 'block';
      pinInput.value = '';
      pinInput.focus();
    }
  }

  // Événements de connexion
  loginBtn.addEventListener('click', verifierPIN);
  pinInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifierPIN();
  });

  // Déconnexion
  logoutBtn.addEventListener('click', () => {
    dashboard.style.display = 'none';
    loginScreen.style.display = 'flex';
    pinInput.value = '';
  });
});
</script>
</body>
</html>
